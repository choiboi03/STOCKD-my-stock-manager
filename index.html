<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES — DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --bg: #F4F6F9;
  --surface: #FFFFFF;
  --surface2: #F0F2F5;
  --border: #E2E8F0;
  --border2: #CBD5E1;
  --text: #0F172A;
  --text2: #334155;
  --muted: #64748B;
  --accent: #2563EB;
  --accent-dim: rgba(37,99,235,0.1);
  --profit: #059669;
  --profit-dim: rgba(5,150,105,0.1);
  --loss: #DC2626;
  --loss-dim: rgba(220,38,38,0.1);
  --alert: #D97706;
  --alert-dim: rgba(217,119,6,0.12);
  --nav-h: 52px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
[data-theme="dark"] {
  --bg: #000000;
  --surface: #111111;
  --surface2: #1A1A1A;
  --border: #222222;
  --border2: #333333;
  --text: #F1F5F9;
  --text2: #CBD5E1;
  --muted: #666666;
  --accent: #3B82F6;
  --accent-dim: rgba(59,130,246,0.15);
  --profit: #22C55E;
  --profit-dim: rgba(34,197,94,0.12);
  --loss: #EF4444;
  --loss-dim: rgba(239,68,68,0.12);
  --alert: #F59E0B;
  --alert-dim: rgba(245,158,11,0.12);
  --shadow: 0 1px 0 rgba(255,255,255,0.04);
  --shadow-md: 0 0 0 1px rgba(255,255,255,0.06);
  --shadow-lg: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.8);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
}
button { cursor: pointer; font-family: inherit; border: none; background: none; }
input, select, textarea { font-family: inherit; font-size: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ═══════════════════════════════════════════
   TYPOGRAPHY UTILITIES
═══════════════════════════════════════════ */
.mono { font-family: 'Space Mono', monospace; }
.text-muted { color: var(--muted); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.profit-text { color: var(--profit); font-family: 'Space Mono', monospace; }
.loss-text   { color: var(--loss);   font-family: 'Space Mono', monospace; }
.neutral-text { color: var(--muted); font-family: 'Space Mono', monospace; }
.fw-600 { font-weight: 600; }

/* ═══════════════════════════════════════════
   HOME SCREEN LAUNCHER
═══════════════════════════════════════════ */
.home-screen {
  min-height: 100vh;
  padding: 24px 20px;
  display: flex; flex-direction: column;
}
.home-brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px;
}
.home-brand-icon {
  font-size: 22px; color: var(--accent);
  font-family: 'Space Mono', monospace;
}
.home-brand-name {
  font-family: 'Space Mono', monospace;
  font-size: 16px; font-weight: 700;
  color: var(--text); letter-spacing: -0.5px;
}
.home-subtitle {
  font-size: 12px; color: var(--muted);
  margin-bottom: 24px;
  font-family: 'Space Mono', monospace;
}
.home-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  flex: 1;
}
.home-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex; flex-direction: column;
  gap: 8px;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.home-tile::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--tile-color, var(--accent));
  opacity: 0.7;
}
.home-tile:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--tile-color, var(--accent));
}
.home-tile:active { transform: translateY(0); }
.home-tile-icon {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  margin-bottom: 2px;
}
.home-tile-label {
  font-size: 13px; font-weight: 700;
  color: var(--text);
}
.home-tile-desc {
  font-size: 11px; color: var(--muted);
  line-height: 1.4;
}
.home-tile-badge {
  position: absolute; top: 10px; right: 10px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; font-weight: 700;
  color: var(--tile-color, var(--accent));
  opacity: 0.8;
}

/* ═══════════════════════════════════════════
   VIEW HEADER HOME ICON BUTTON
═══════════════════════════════════════════ */
.home-icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; flex-shrink: 0;
  border-radius: var(--radius-sm);
  color: var(--muted);
  transition: color 0.15s, background 0.15s;
  margin-right: 4px;
}
.home-icon-btn:hover {
  color: var(--accent);
  background: var(--accent-dim);
}

/* ═══════════════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════════════ */
#app {
  min-height: 100vh;
}
.view {
  padding: 20px 20px 40px;
  max-width: 1400px;
  margin: 0 auto;
}
.view-header {
  display: grid;
  grid-template-columns: 40px 1fr 40px;
  align-items: center;
  margin-bottom: 20px;
  gap: 8px;
  min-height: 36px;
}
/* Right-side button groups need their own column sizing */
.view-header > div.flex-row,
.view-header > button.btn {
  justify-self: end;
  grid-column: 3;
}
/* When right side has many buttons, let it grow */
.view-header.wide-right {
  grid-template-columns: 40px 1fr auto;
}
.view-title {
  font-size: 18px; font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: var(--text);
  text-align: center;
  white-space: nowrap;
  grid-column: 2;
}

/* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); margin-bottom: 8px;
}

/* STAT CARDS */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.stat-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted); margin-bottom: 6px;
}
.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 20px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.stat-sub {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: var(--muted);
  margin-top: 4px;
}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 34px; padding: 0 14px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { filter: brightness(1.1); }
.btn-secondary {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { background: var(--border); }
.btn-danger {
  background: var(--loss-dim);
  color: var(--loss);
  border: 1px solid var(--loss);
}
.btn-danger:hover { background: var(--loss); color: #fff; }
.btn-ghost { color: var(--muted); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-icon { padding: 0 8px; }

/* ═══════════════════════════════════════════
   FORMS
═══════════════════════════════════════════ */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--muted); margin-bottom: 5px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.form-input.mono, .mono-input {
  font-family: 'Space Mono', monospace;
}
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
.toggle-group { display: flex; gap: 6px; }
.toggle-btn {
  flex: 1; height: 34px; padding: 0 12px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--surface2); color: var(--muted);
  transition: all 0.15s;
}
.toggle-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent); font-weight: 600;
}
.toggle-btn.active.buy { border-color: var(--profit); background: var(--profit-dim); color: var(--profit); }
.toggle-btn.active.sell { border-color: var(--loss); background: var(--loss-dim); color: var(--loss); }

/* ═══════════════════════════════════════════
   TABLES
═══════════════════════════════════════════ */
.table-toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.filter-select {
  height: 32px; padding: 0 8px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 12px;
  cursor: pointer;
}
/* Date inputs in filter bars — consistent width across browsers */
.filter-date {
  width: 136px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
}
/* Date inputs inside modals — match other form-inputs exactly */
input[type="date"].form-input {
  width: 100%;
  font-family: inherit;
  cursor: pointer;
}
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th {
  padding: 10px 12px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted);
  text-align: left; white-space: nowrap;
  cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border);
  transition: color 0.15s;
}
th:hover { color: var(--text); }
th.sorted { color: var(--accent); }
th .sort-arrow { margin-left: 4px; opacity: 0.5; }
th.sorted .sort-arrow { opacity: 1; }
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; white-space: nowrap;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
tr.row-zero td { opacity: 0.45; }
.td-num { font-family: 'Space Mono', monospace; text-align: right; }

/* ═══════════════════════════════════════════
   BADGES & PILLS
═══════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center;
  height: 20px; padding: 0 7px;
  border-radius: 10px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.badge-buy  { background: var(--profit-dim); color: var(--profit); }
.badge-sell { background: var(--loss-dim);   color: var(--loss); }
.badge-us   { background: var(--accent-dim); color: var(--accent); }
.badge-kr   { background: rgba(168,85,247,0.1); color: #a855f7; }
.tag-pill {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px;
  border-radius: 11px;
  font-size: 11px; font-weight: 500;
  background: var(--accent-dim); color: var(--accent);
  cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent;
}
.tag-pill:hover { border-color: var(--accent); }
.tag-pill.selected { background: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  padding: 24px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
.modal-lg { max-width: 720px; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 18px;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-footer {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* Modal tabs */
.modal-tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.modal-tab {
  padding: 8px 14px; font-size: 13px; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all 0.15s;
}
.modal-tab:hover { color: var(--text); }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ═══════════════════════════════════════════
   SEARCH RESULTS
═══════════════════════════════════════════ */
.search-results {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  box-shadow: var(--shadow-md);
  max-height: 200px; overflow-y: auto;
  margin-top: 4px;
}
.search-result-item {
  padding: 10px 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--surface2); }
.search-result-name { font-weight: 500; font-size: 13px; }
.search-result-ticker {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: var(--accent);
}
.search-result-exchange { font-size: 11px; color: var(--muted); }

/* ═══════════════════════════════════════════
   ALERT CARDS
═══════════════════════════════════════════ */
.alert-card {
  background: var(--alert-dim);
  border: 1px solid var(--alert);
  border-left: 4px solid var(--alert);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.alert-card-title {
  font-weight: 600; font-size: 13px;
  color: var(--alert); margin-bottom: 4px;
}
.alert-card-body { font-size: 12px; color: var(--text2); }

/* ═══════════════════════════════════════════
   SHIMMER LOADING
═══════════════════════════════════════════ */
.shimmer {
  background: linear-gradient(90deg,
    var(--surface2) 25%, var(--border2) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 3px;
  color: transparent !important;
  pointer-events: none;
  min-width: 60px;
  display: inline-block;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ═══════════════════════════════════════════
   TOAST NOTIFICATIONS
═══════════════════════════════════════════ */
#toast-container {
  position: fixed; bottom: 20px; right: 20px;
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-md);
  animation: slideLeft 0.2s ease;
  max-width: 320px;
}
.toast-success { background: var(--profit); color: #fff; }
.toast-error   { background: var(--loss);   color: #fff; }
.toast-info    { background: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════ */
.progress-bar {
  height: 6px; background: var(--surface2);
  border-radius: 3px; overflow: hidden;
  margin: 6px 0;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  background: var(--accent);
  transition: width 0.4s ease;
}

/* ═══════════════════════════════════════════
   TABS (inline view tabs)
═══════════════════════════════════════════ */
.tabs {
  display: flex; gap: 4px;
  background: var(--surface2);
  padding: 4px; border-radius: var(--radius-sm);
  margin-bottom: 16px; width: fit-content;
}
.tab-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  border-radius: 5px; color: var(--muted);
  transition: all 0.15s;
}
.tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* ═══════════════════════════════════════════
   CHARTS GRID
═══════════════════════════════════════════ */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.chart-title {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted); margin-bottom: 12px;
}
.chart-canvas-wrap { position: relative; height: 220px; }

/* ═══════════════════════════════════════════
   RULE CARD
═══════════════════════════════════════════ */
.rule-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.rule-card-body { flex: 1; }
.rule-card-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
.rule-card-cond  { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }

/* ═══════════════════════════════════════════
   TOGGLE SWITCH
═══════════════════════════════════════════ */
.switch {
  position: relative; width: 36px; height: 20px;
  cursor: pointer; flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.switch-track {
  position: absolute; inset: 0;
  background: var(--border2); border-radius: 10px;
  transition: background 0.2s;
}
.switch input:checked ~ .switch-track { background: var(--accent); }
.switch-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 14px; height: 14px;
  background: #fff; border-radius: 50%;
  transition: transform 0.2s;
}
.switch input:checked ~ .switch-thumb { transform: translateX(16px); }

/* ═══════════════════════════════════════════
   PLAYBOOK PRINCIPLE ITEMS
═══════════════════════════════════════════ */
.principle-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
}
.principle-num {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: var(--accent);
  width: 20px; flex-shrink: 0;
}
.principle-text { flex: 1; font-size: 13px; }
.principle-actions { display: flex; gap: 4px; flex-shrink: 0; }

═══════════════════════════════════════════ */
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideLeft { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.divider { height: 1px; background: var(--border); margin: 16px 0; }
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--muted); font-size: 13px;
}
.empty-state-icon { font-size: 32px; margin-bottom: 8px; }
.flex-row  { display: flex; align-items: center; gap: 8px; }
.flex-wrap { flex-wrap: wrap; }
.gap-4 { gap: 4px; }
.gap-8 { gap: 8px; }
.mt-8  { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-12 { margin-bottom: 12px; }
.stale-icon { color: var(--alert); font-size: 11px; margin-left: 3px; }
.pagination {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.section-header {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); margin-bottom: 10px;
}

/* Settings section card */
.settings-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.settings-section-title {
  font-size: 13px; font-weight: 700;
  margin-bottom: 14px; color: var(--text);
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: 13px; font-weight: 500; }
.settings-row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Pagination buttons */
.page-btn {
  height: 28px; padding: 0 10px;
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.page-btn:hover { background: var(--border); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.input-unit-wrap {
  position: relative; display: flex; align-items: center;
}
.input-unit-wrap .form-input {
  padding-right: 40px;
}
.input-unit {
  position: absolute; right: 10px;

  font-size: 11px; font-weight: 700;
  color: var(--muted);
  pointer-events: none;
  user-select: none;
}

}
.onboard-card {
  background: var(--surface);

  border-radius: 18px;

}
.onboard-logo {
  font-family: 'Space Mono', monospace;
  font-size: 26px; font-weight: 700;
  color: var(--accent);

}
.onboard-tagline {
  text-align: center;
  font-size: 13px; color: var(--muted);
  margin-bottom: 32px;
}
.onboard-step-label {

  color: var(--muted); text-align: center;

}
.onboard-lang-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}
.onboard-lang-btn {
  padding: 20px 12px;
  border-radius: 12px;

  background: var(--surface2);

}

.onboard-lang-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

}

  display: flex; align-items: flex-start; gap: 14px;
}
.onboard-feature-icon {
  font-size: 22px; line-height: 1;

}
.onboard-feature-text { flex: 1; }

.onboard-feature-desc  { font-size: 12px; color: var(--muted); line-height: 1.4; }
.onboard-data-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}
.onboard-data-btn {
  padding: 18px 12px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--surface2);
  cursor: pointer; transition: all 0.15s;
  text-align: center;
}
.onboard-data-btn:hover { border-color: var(--accent); background: var(--accent-dim); }

.onboard-data-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.onboard-data-desc  { font-size: 11px; color: var(--muted); line-height: 1.4; }
.onboard-dots {

.onboard-dot {

}
.onboard-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }
.onboard-btn-primary {
  width: 100%; height: 44px;

function getAccounts() {
  const s = db.settings;
  const deleted = s.deletedAccounts || [];
  const active  = getPresetAccounts().filter(a => !deleted.includes(a));
  return [...active, ...(s.customAccounts || [])];
}
function getCategories() {
  const s = db.settings;
  const deleted = s.deletedCategories || [];
  const active  = getPresetCategories().filter(c => !deleted.includes(c));
  return [...active, ...(s.customCategories || [])];
}

function toKRW(value, currency) {
  if (currency === 'USD') return value * db.exchangeRate.USDKRW;
  return value;
}
function calcStock(s) {
  const cp = s.currentPrice;
  const cv  = cp != null ? s.holdings * cp : null;
  const ia  = s.holdings * s.avgPrice;
  const pa  = cv != null ? cv - ia : null;
  const pr  = (pa != null && ia > 0) ? (pa / ia) * 100 : null;
  return { ...s, currentValue:cv, investedAmount:ia, profitAmount:pa, profitRate:pr };
}
function totalCashKRW() {
  if (!db.cashBalances) return 0;
  return Object.values(db.cashBalances).reduce((sum, c) => {
    if (!c || !c.amount) return sum;
    return sum + toKRW(c.amount, c.currency || 'KRW');
  }, 0);
}
function totalPortfolioValue() {
  const stocksVal = db.stocks.reduce((sum, s) => {
    const cp = s.currentPrice;
    if (cp == null || s.holdings <= 0) return sum;
    return sum + toKRW(s.holdings * cp, s.currency);
  }, 0);
  return stocksVal + totalCashKRW();
}
function totalInvestedValue() {
  return db.trades
    .filter(t => t.type === 'buy')
    .reduce((sum, t) => {
      const s = db.stocks.find(x => x.id === t.stockId);
      return sum + toKRW(t.quantity * t.price, s?.currency || 'USD');
    }, 0);
}
function formatNum(n, dec=0, prefix='') {
  if (n == null || isNaN(n)) return t('common.na');
  const lang = db.settings.language === 'ko' ? 'ko-KR' : 'en-US';
  return prefix + n.toLocaleString(lang, { minimumFractionDigits:dec, maximumFractionDigits:dec });
}
function formatKRW(n) {
  if (n == null || isNaN(n)) return t('common.na');
  if (db.settings.language === 'ko') return '₩' + formatNum(n, 0);
  return '₩' + formatNum(n, 0);
}
function formatPrice(n, currency) {
  if (n == null || isNaN(n)) return t('common.na');
  if (currency === 'USD' && db.settings.currency === 'USD') return '$' + formatNum(n, 2);
  return '₩' + formatNum(toKRW(n, currency), 0);
}
function formatPct(n) {
  if (n == null || isNaN(n)) return t('common.na');
  const sym = n >= 0 ? '▲' : '▼';
  return `${sym}${Math.abs(n).toFixed(2)}%`;
}
function plClass(n) {
  if (n == null || isNaN(n)) return 'neutral-text';
  return n >= 0 ? 'profit-text' : 'loss-text';
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (db.settings.language === 'ko') return dt.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'.').replace(/\.$/,'');
  return dt.toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'});
}
function today() { return new Date().toISOString().slice(0,10); }

const PROXY = 'https://corsproxy.io/?';
function yahooTicker(s) {
  if (s.exchange === 'KR') return s.ticker + (s.ticker.length === 6 ? '.KS' : '');
  return s.ticker;
}
async function fetchPrice(s) {
  const url = PROXY + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${yahooTicker(s)}`);
  const r = await fetch(url);
  const d = await r.json();
  return d.chart.result[0].meta.regularMarketPrice;
}
async function fetchExchangeRate() {
  const url = PROXY + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/KRW=X`);
  const r = await fetch(url);
  const d = await r.json();
  return d.chart.result[0].meta.regularMarketPrice;
}
async function fetchSearchResults(query) {
  const url = PROXY + encodeURIComponent(`https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=8&lang=en-US`);
  const r = await fetch(url);
  const d = await r.json();
  return d.quotes || [];
}
async function fetch30DayChart(s) {
  const url = PROXY + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${yahooTicker(s)}?interval=1d&range=1mo`);
  const r = await fetch(url);
  const d = await r.json();
  const res = d.chart.result[0];
  return { timestamps: res.timestamp, closes: res.indicators.quote[0].close };
}

let refreshing = false;
async function refreshAllPrices() {
  if (refreshing) return;
  refreshing = true;
  const btn = document.querySelector('[data-action="refresh"]');
  if (btn) { btn.disabled = true; btn.textContent = t('dashboard.loading'); }
  try {
    const rate = await fetchExchangeRate();
    db.exchangeRate = { USDKRW: rate, updatedAt: new Date().toISOString() };
    saveDB();
  } catch(e) { /* keep cached */ }

  for (const stock of db.stocks) {
    const cell = document.querySelector(`[data-price-cell="${stock.id}"]`);
    if (cell) cell.classList.add('shimmer');
    try {
      stock.currentPrice = await fetchPrice(stock);
      stock.priceUpdatedAt = new Date().toISOString();
      stock.stale = false;
    } catch(e) { stock.stale = true; }
    saveDB();
    if (cell) {
      cell.classList.remove('shimmer');
      cell.textContent = formatPrice(stock.currentPrice, stock.currency);
      if (stock.stale) cell.innerHTML += ' <span class="stale-icon" title="Stale">⚠</span>';
    }
    await new Promise(r => setTimeout(r, 300));
  }
  refreshing = false;
  if (btn) { btn.disabled = false; btn.textContent = t('dashboard.refreshPrices'); }
  if (currentView === 'dashboard') reRenderView(renderDashboard);
}

function navigate(viewId) {
  currentView = viewId;
  saveView(viewId);
  destroyCharts();

  const app = document.getElementById('app');
  app.innerHTML = '';

  if (viewId === 'home') { renderHome(); return; }

  const meta = getViewMeta().find(v => v.id === viewId);

  // View root — renderers write here
  const root = document.createElement('div');
  root.id = 'view-root';
  app.appendChild(root);

  // Override getElementById so renderers writing to 'app' go into root
  const origGetById = document.getElementById.bind(document);
  document.getElementById = function(id) {
    if (id === 'app') return root;
    return origGetById(id);
  };

  const map = { dashboard:renderDashboard, graphs:renderGraphs, tradelog:renderTradelog,
                news:renderNews, myrule:renderMyrule, playbook:renderPlaybook,
                mydb:renderMydb, settings:renderSettings };
  (map[viewId] || renderDashboard)();

  // Restore original
  document.getElementById = origGetById;

  // Inject SVG home button to the LEFT of the view title in .view-header
  const viewHeader = root.querySelector('.view-header');
  if (viewHeader) {
    const homeBtn = document.createElement('button');
    homeBtn.className = 'home-icon-btn';
    homeBtn.title = 'Home';
    homeBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 13 15 13 15 21"/></svg>`;
    homeBtn.addEventListener('click', () => navigate('home'));
    viewHeader.insertBefore(homeBtn, viewHeader.firstChild);
  }
}

// Re-render the current view in-place WITHOUT touching the topbar/home button.
// Use this instead of calling renderX() directly from within a view.
function reRenderView(renderFn) {
  const root = document.getElementById('view-root');
  if (!root) { renderFn(); return; } // fallback: home screen or direct call

  root.innerHTML = '';
  const origGetById = document.getElementById.bind(document);
  document.getElementById = function(id) {
    if (id === 'app') return root;
    return origGetById(id);
  };
  renderFn();
  document.getElementById = origGetById;

  // Re-inject home button into new view-header if it doesn't have one already
  const viewHeader = root.querySelector('.view-header');
  if (viewHeader && !viewHeader.querySelector('.home-icon-btn')) {
    const homeBtn = document.createElement('button');
    homeBtn.className = 'home-icon-btn';
    homeBtn.title = 'Home';
    homeBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 13 15 13 15 21"/></svg>`;
    homeBtn.addEventListener('click', () => navigate('home'));
    viewHeader.insertBefore(homeBtn, viewHeader.firstChild);
  }
}

function renderDashTable(total) {
  const cols = [
    {key:'name',        label:t('cols.name')},
    {key:'ticker',      label:t('cols.ticker')},
    {key:'currentPrice',label:t('cols.curPrice')},
    {key:'holdings',    label:t('cols.shares')},
    {key:'profitAmount',label:t('cols.pl')},
    {key:'profitRate',  label:t('cols.plPct')},
    {key:'avgPrice',    label:t('cols.avgPrice')},
    {key:'account',     label:t('cols.account')},
    {key:'category',    label:t('cols.category')},
    {key:'allocation',  label:t('cols.alloc')}
  ];

  let rows = db.stocks
    .filter(s => (dashFilter.account === 'all' || s.account === dashFilter.account)
              && (dashFilter.category === 'all' || s.category === dashFilter.category)
              && (dashFilter.exchange === 'all' || s.exchange === dashFilter.exchange))
    .map(s => { const c = calcStock(s); return { ...c, allocation: c.currentValue != null ? toKRW(c.currentValue,s.currency)/total*100 : null }; });

  rows.sort((a,b) => {
    const va = a[dashSort.col], vb = b[dashSort.col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1; if (vb == null) return -1;
    if (typeof va === 'string') return va.localeCompare(vb) * dashSort.dir;
    return (va - vb) * dashSort.dir;
  });

  const arrowFor = key => {
    if (dashSort.col !== key) return '<span class="sort-arrow">⇅</span>';
    return `<span class="sort-arrow">${dashSort.dir > 0 ? '↑' : '↓'}</span>`;
  };

  if (rows.length === 0) return `<table><tbody><tr><td colspan="${cols.length}" class="empty-state" style="padding:32px">
    <div class="empty-state-icon">📂</div>
    ${t('dashboard.emptyState')}
  </td></tr></tbody></table>`;

  return `<table>
    <thead><tr>
      ${cols.map(c => `<th data-col="${c.key}" class="${dashSort.col===c.key?'sorted':''}">${c.label}${arrowFor(c.key)}</th>`).join('')}
    </tr></thead>
    <tbody>
      ${rows.map(s => `
      <tr class="stock-row ${s.holdings===0?'row-zero':''}" data-stock-id="${s.id}" style="cursor:pointer">
        <td><span class="fw-600">${s.name}</span></td>
        <td><span class="mono" style="color:var(--accent)">${s.ticker}</span></td>
        <td class="td-num" data-price-cell="${s.id}">
          ${s.currentPrice == null ? '<span class="shimmer">loading</span>' : formatPrice(s.currentPrice, s.currency)}
          ${s.stale ? '<span class="stale-icon" title="Stale">⚠</span>' : ''}
        </td>
        <td class="td-num">${formatNum(s.holdings, s.holdings%1===0?0:4)}</td>
        <td class="td-num ${plClass(s.profitAmount)}">${s.profitAmount != null ? (s.currency==='USD' && db.settings.currency==='USD' ? (s.profitAmount>=0?'+':'')+formatNum(s.profitAmount,2,'$') : (s.profitAmount>=0?'+':'')+formatKRW(toKRW(s.profitAmount,s.currency))) : '--'}</td>
        <td class="td-num ${plClass(s.profitRate)}">${s.profitRate != null ? formatPct(s.profitRate) : '--'}</td>
        <td class="td-num">${s.currency==='USD' ? '$'+formatNum(s.avgPrice,2) : '₩'+formatNum(s.avgPrice,0)}</td>
        <td><span class="text-sm">${s.account}</span></td>
        <td><span class="text-sm">${s.category}</span></td>
        <td class="td-num">${s.allocation != null ? formatNum(s.allocation,1)+'%' : '--'}</td>
      </tr>`).join('')}
    </tbody></table>`;
}

function recalcStock(stockId) {
  const stock = db.stocks.find(s => s.id === stockId);
  if (!stock) return;
  const trades = db.trades.filter(t => t.stockId === stockId).sort((a,b) => new Date(a.date)-new Date(b.date));
  let h=0, cost=0;
  for (const tr of trades) {
    if (tr.type==='buy')  { cost += tr.quantity * tr.price; h += tr.quantity; }
    else                  { h = Math.max(0, h - tr.quantity); }
  }
  stock.holdings = h;
  stock.avgPrice = h > 0 ? cost/h : stock.avgPrice;
  saveDB();
}

function defaultFrom() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return d.toISOString().slice(0, 10);

function renderTradeTable() {
  let rows = db.trades.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));

  if (tlFilter.from) rows = rows.filter(t => t.date >= tlFilter.from);
  if (tlFilter.to)   rows = rows.filter(t => t.date <= tlFilter.to);
  if (!rows.length) return `<table><tbody><tr><td colspan="8" class="empty-state">${t('trade.noTrades')}</td></tr></tbody></table>`;
  return `<table>
    <thead><tr>
      <th>${t('trade.date')}</th><th>${t('trade.stock')}</th><th>${t('trade.type')}</th>
      <th>${t('trade.qty')}</th><th>${t('trade.price')}</th><th>${t('trade.total')}</th>
      <th>${t('trade.memo')}</th><th></th>
    </tr></thead>
    <tbody>${rows.map(tr => {
      const s = db.stocks.find(x=>x.id===tr.stockId);
      const total = tr.quantity * tr.price;
      return `<tr>
        <td class="mono text-sm">${formatDate(tr.date)}</td>

}

let newsFilter = { stockId:'all', from:defaultFrom(), to:today(), q:'' };

function renderNews() {
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="view">
    <div class="view-header">
      <span class="view-title">${t('news.title')}</span>
      <button class="btn btn-primary btn-sm" data-action="add-news">${t('news.addNews')}</button>

    </div>

  app.querySelector('#nf-from').addEventListener('change',  e=>{newsFilter.from=e.target.value;app.querySelector('#news-list').innerHTML=renderNewsList();});
  app.querySelector('#nf-to').addEventListener('change',    e=>{newsFilter.to=e.target.value;app.querySelector('#news-list').innerHTML=renderNewsList();});
  app.querySelector('#nf-q').addEventListener('input',      e=>{newsFilter.q=e.target.value;app.querySelector('#news-list').innerHTML=renderNewsList();});
  bindNewsActions();
}

function renderNewsList() {
  let items = db.news.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (newsFilter.stockId !== 'all') items = items.filter(n => n.relatedStockIds.includes(newsFilter.stockId));
  if (newsFilter.from) items = items.filter(n => n.date >= newsFilter.from);
  if (newsFilter.to)   items = items.filter(n => n.date <= newsFilter.to);
  if (newsFilter.q) { const q=newsFilter.q.toLowerCase(); items = items.filter(n => n.summary.toLowerCase().includes(q) || n.source.toLowerCase().includes(q)); }
  if (!items.length) return `<div class="empty-state"><div class="empty-state-icon">📰</div>${t('news.noNews')}</div>`;
  return items.map(n => {
    const related = n.relatedStockIds.map(id => db.stocks.find(s=>s.id===id)).filter(Boolean);
    return `<div class="card mb-12">
      <div class="flex-row" style="justify-content:space-between;margin-bottom:8px">
        <div class="flex-row">
          <span class="mono text-sm text-muted">${formatDate(n.date)}</span>
          ${n.url ? `<a href="${n.url}" target="_blank" class="fw-600 text-sm">${n.source}</a>` : `<span class="fw-600 text-sm">${n.source}</span>`}
        </div>
        <div class="flex-row">
          <button class="btn btn-ghost btn-sm btn-icon" data-edit-news="${n.id}">✏</button>
          <button class="btn btn-ghost btn-sm btn-icon" data-delete-news="${n.id}">✕</button>
        </div>
      </div>
      <p class="text-sm" style="color:var(--text2);margin-bottom:8px;line-height:1.5">${n.summary}</p>
      <div class="flex-row flex-wrap gap-4">${related.map(s=>`<span class="tag-pill" data-filter-stock="${s.id}">${s.name}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function bindNewsActions() {
  const root = document.getElementById('view-root') || document.getElementById('app');
  root.querySelectorAll('[data-edit-news]').forEach(b => b.addEventListener('click', () => {
    const n = db.news.find(x=>x.id===b.dataset.editNews); if(n) openNewsModal(n);
  }));
  root.querySelectorAll('[data-delete-news]').forEach(b => b.addEventListener('click', () => {
    if (!confirm(t('news.deleteConfirm'))) return;
    db.news = db.news.filter(n=>n.id!==b.dataset.deleteNews);
    saveDB(); reRenderView(renderNews);
  }));
  root.querySelectorAll('[data-filter-stock]').forEach(p => p.addEventListener('click', () => {
    newsFilter.stockId = p.dataset.filterStock;
    const sel = root.querySelector('#nf-stock');
    if (sel) sel.value = newsFilter.stockId;
    const newsList = root.querySelector('#news-list');
    if (newsList) { newsList.innerHTML = renderNewsList(); bindNewsActions(); }
  }));
}

const CHART_COLORS = ['#3B82F6','#22C55E','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#EC4899'];

function renderGraphs() {
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="view">
    <div class="view-header"><span class="view-title">${t("graphs.title")}</span><span></span></div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">${t('graphs.allocByStock')}</div><div class="chart-canvas-wrap"><canvas id="c-alloc-stock"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">${t('graphs.allocByCat')}</div><div class="chart-canvas-wrap"><canvas id="c-alloc-cat"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">${t('graphs.allocByAcc')}</div><div class="chart-canvas-wrap"><canvas id="c-alloc-acc"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">${t('graphs.prByStock')}</div><div class="chart-canvas-wrap"><canvas id="c-pr-stock"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">${t('graphs.prByCat')}</div><div class="chart-canvas-wrap"><canvas id="c-pr-cat"></canvas></div></div>

      <div class="chart-card"><div class="chart-title">${t('graphs.monthlyReturn')}</div><div class="chart-canvas-wrap"><canvas id="c-monthly"></canvas></div></div>
    </div>
  </div>`;

function initCharts() {
  const total   = totalPortfolioValue();
  const isDark  = db.settings.theme === 'dark';
  const isKo    = db.settings.language === 'ko';
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#94A3B8' : '#64748B';

  // ── shared tooltip formatter ──────────────────────────────
  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } }
  };

  // Donut: show value (₩) + allocation (%)
  function mkDonut(id, labels, data) {
    const ctx = document.getElementById(id); if (!ctx) return;
    const dataTotal = data.reduce((a,b)=>a+b, 0);
    const inst = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: CHART_COLORS, borderWidth: 2, borderColor: isDark?'#111111':'#fff' }] },
      options: {
        ...baseOpts, cutout: '65%',
        plugins: {
          ...baseOpts.plugins,
          tooltip: {
            callbacks: {
              label: ctx => {
                const val = ctx.parsed;
                const pct = dataTotal > 0 ? (val / dataTotal * 100).toFixed(1) : '0';
                const valStr = '₩' + Math.round(val).toLocaleString(isKo?'ko-KR':'en-US');
                return ` ${ctx.label}: ${valStr}  (${pct}%)`;
              }
            }
          }
        }
      }
    });
    chartInstances.set(id, inst);
  }

  // Horizontal bar: show value (%) + KRW amount
  function mkHBar(id, labels, data, dataKRW) {
    const ctx = document.getElementById(id); if (!ctx) return;
    const bgColors = data.map(v => v>=0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)');
    const inst = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: bgColors, borderRadius: 4 }] },
      options: {
        ...baseOpts, indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const pct = ctx.parsed.x.toFixed(2) + '%';
                if (dataKRW && dataKRW[ctx.dataIndex] != null) {
                  const krw = '₩' + Math.round(dataKRW[ctx.dataIndex]).toLocaleString(isKo?'ko-KR':'en-US');
                  return ` ${pct}  (${krw})`;
                }
                return ` ${pct}`;
              }
            }
          }
        },
        scales: {
          x: { grid:{color:gridColor}, ticks:{color:textColor, callback:v=>v+'%'} },
          y: { grid:{display:false}, ticks:{color:textColor, font:{size:11}} }
        }
      }
    });
    chartInstances.set(id, inst);
  }

  // 1. Allocation by stock
  const activeStocks = db.stocks.filter(s => s.holdings > 0 && s.currentPrice != null);
  const cashLabel = t('dashboard.cashLabel');

  // Build cash data for charts
  const cashEntries = Object.entries(db.cashBalances||{}).filter(([,c])=>c&&c.amount>0);
  const totalCashVal = cashEntries.reduce((s,[,c])=>s+toKRW(c.amount,c.currency||'KRW'),0);

  // 1. Allocation by stock (cash as single "현금/Cash" slice)
  const stockLabels = activeStocks.map(s=>s.name);
  const stockVals   = activeStocks.map(s=>toKRW(s.holdings*s.currentPrice,s.currency));
  if (totalCashVal > 0) { stockLabels.push(cashLabel); stockVals.push(totalCashVal); }
  mkDonut('c-alloc-stock', stockLabels, stockVals);

  // 2. Allocation by category (cash → "현금성/Cash" category)
  const byCat = {};
  activeStocks.forEach(s => { byCat[s.category] = (byCat[s.category]||0) + toKRW(s.holdings*s.currentPrice,s.currency); });
  if (totalCashVal > 0) byCat[cashLabel] = (byCat[cashLabel]||0) + totalCashVal;
  mkDonut('c-alloc-cat', Object.keys(byCat), Object.values(byCat));

  // 3. Allocation by account (cash split per account)
  const byAcc = {};
  activeStocks.forEach(s => { byAcc[s.account] = (byAcc[s.account]||0) + toKRW(s.holdings*s.currentPrice,s.currency); });
  cashEntries.forEach(([acc,c]) => { byAcc[acc] = (byAcc[acc]||0) + toKRW(c.amount,c.currency||'KRW'); });
  mkDonut('c-alloc-acc', Object.keys(byAcc), Object.values(byAcc));

  // 4. Profit rate by stock (with KRW P&L amount in tooltip)
  const prStocks = activeStocks.map(s=>calcStock(s)).filter(s=>s.profitRate!=null).sort((a,b)=>b.profitRate-a.profitRate);
  mkHBar('c-pr-stock',
    prStocks.map(s=>s.name),
    prStocks.map(s=>parseFloat(s.profitRate.toFixed(2))),
    prStocks.map(s=>s.profitAmount!=null ? toKRW(s.profitAmount,s.currency) : null)
  );

  // 5. Profit rate by category (with avg KRW P&L)
  const catPR={}, catKRW={}, catCount={};
  db.stocks.forEach(s => {
    const c = calcStock(s);
    if (c.profitRate != null) {
      catPR[s.category]   = (catPR[s.category]||0) + c.profitRate;
      catKRW[s.category]  = (catKRW[s.category]||0) + (c.profitAmount!=null?toKRW(c.profitAmount,s.currency):0);
      catCount[s.category]= (catCount[s.category]||0) + 1;
    }
  });
  const catKeys = Object.keys(catPR).sort((a,b)=>catPR[b]/catCount[b]-catPR[a]/catCount[a]);
  mkHBar('c-pr-cat',
    catKeys,
    catKeys.map(k=>parseFloat((catPR[k]/catCount[k]).toFixed(2))),
    catKeys.map(k=>catKRW[k])
  );

  // 6. Cumulative P&L (line)
  const sortedTrades = db.trades.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cDates=[], cVals=[], cRaw=[];
  sortedTrades.forEach(tr => {
    const s = db.stocks.find(x=>x.id===tr.stockId);
    if (!s || !s.currentPrice) return;
    const unrealized = db.stocks.reduce((sum,st)=>{
      if (!st.currentPrice||st.holdings<=0) return sum;
      return sum + toKRW((st.currentPrice-st.avgPrice)*st.holdings, st.currency);
    },0);
    cDates.push(formatDate(tr.date));
    cRaw.push(Math.round(unrealized));
    cVals.push(isKo ? Math.round(unrealized/10000)/100 : Math.round(unrealized));
  });
  if (cDates.length) {
    const ctx6 = document.getElementById('c-cumpnl');
    if (ctx6) {
      const yLabel = isKo ? (v=>v+'만') : (v=>'₩'+Math.round(v).toLocaleString('en-US'));
      const inst = new Chart(ctx6, {
        type: 'line',
        data: { labels:cDates, datasets:[{ data:cVals, borderColor:'#3B82F6', backgroundColor:'rgba(59,130,246,0.1)', fill:true, tension:0.3, pointRadius:3 }] },
        options: {
          ...baseOpts,
          plugins: {
            legend: {display:false},
            tooltip: { callbacks: { label: ctx => {
              const raw = cRaw[ctx.dataIndex];
              return ' ₩' + Math.round(raw).toLocaleString(isKo?'ko-KR':'en-US');
            }}}
          },
          scales: {
            x: { grid:{color:gridColor}, ticks:{color:textColor,maxTicksLimit:6,font:{size:10}} },
            y: { grid:{color:gridColor}, ticks:{color:textColor, callback:yLabel} }
          }
        }
      });
      chartInstances.set('c-cumpnl', inst);
    }
  }

  // 7. Monthly return (bar)
  const now = new Date();
  const months=[], monthVals=[], monthRaw=[];
  for (let i=5;i>=0;i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = isKo
      ? d.toLocaleDateString('ko-KR',{month:'short'})
      : d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    months.push(label);
    const monthTrades = db.trades.filter(t=>t.type==='sell'&&t.date.startsWith(key));
    const pnl = monthTrades.reduce((s,tr)=>{
      const st=db.stocks.find(x=>x.id===tr.stockId);
      return s + toKRW((tr.price-(st?.avgPrice||0))*tr.quantity, st?.currency||'USD');
    },0);
    monthRaw.push(Math.round(pnl));
    monthVals.push(isKo ? Math.round(pnl/10000)/100 : Math.round(pnl));
  }
  const ctx7 = document.getElementById('c-monthly');
  if (ctx7) {

      data: { labels:months, datasets:[{ data:monthVals, backgroundColor:monthVals.map(v=>v>=0?'rgba(34,197,94,0.7)':'rgba(239,68,68,0.7)'), borderRadius:4 }] },
      options: {
        ...baseOpts,
        plugins: {
          legend: {display:false},
          tooltip: { callbacks: { label: ctx => {
            const raw = monthRaw[ctx.dataIndex];
            return ' ₩' + Math.round(raw).toLocaleString(isKo?'ko-KR':'en-US');

        },
        scales: {

    });

  }
}

function evaluateRules() {
  const triggered = [];
  const total = totalPortfolioValue();
  for (const rule of db.rules.filter(r=>r.active)) {
    const targets = rule.condition.stockId ? db.stocks.filter(s=>s.id===rule.condition.stockId) : db.stocks;
    for (const s of targets) {
      const c = calcStock(s);
      let actual = null;
      const m = rule.condition.metric;
      if (m==='profitRate') actual = c.profitRate;
      if (m==='lossRate')   actual = c.profitRate != null ? -c.profitRate : null;
      if (m==='allocation') actual = (c.currentValue!=null&&total>0) ? toKRW(c.currentValue,s.currency)/total*100 : null;
      if (m==='targetPrice') actual = s.currentPrice;
      if (actual == null) continue;
      const v = rule.condition.value;
      const ops = { gt:actual>v, lt:actual<v, gte:actual>=v, lte:actual<=v };
      if (ops[rule.condition.operator]) triggered.push({ rule, stock:s, actual });
    }
  }
  return triggered;
}

const metricLabels  = () => ({ profitRate:t('rule.metricProfitRate'), lossRate:t('rule.metricLossRate'), allocation:t('rule.metricAllocation'), targetPrice:t('rule.metricTargetPrice') });
const opLabels      = () => ({ gt:t('rule.opGt'), lt:t('rule.opLt'), gte:t('rule.opGte'), lte:t('rule.opLte') });

  const content = document.getElementById('pb-content');

  content.querySelector('[data-action="add-principle"]')?.addEventListener('click', () => {

  });
  content.querySelectorAll('[data-move-up]').forEach(b => b.addEventListener('click', () => {
    const items = db.playbook.principles;
    const i = items.findIndex(x=>x.id===b.dataset.moveUp);
    if (i>0) { [items[i-1],items[i]]=[items[i],items[i-1]]; saveDB(); content.innerHTML=renderPrinciples(); bindPlaybookActions(); }
  }));
  content.querySelectorAll('[data-move-down]').forEach(b => b.addEventListener('click', () => {
    const items = db.playbook.principles;
    const i = items.findIndex(x=>x.id===b.dataset.moveDown);
    if (i<items.length-1) { [items[i+1],items[i]]=[items[i],items[i+1]]; saveDB(); content.innerHTML=renderPrinciples(); bindPlaybookActions(); }
  }));
  content.querySelectorAll('[data-edit-p]').forEach(b => b.addEventListener('click', () => {
    const p=db.playbook.principles.find(x=>x.id===b.dataset.editP);

      <button class="btn btn-primary btn-sm" data-action="add-stock">${t('dashboard.addStock')}</button>
    </div>
    <div class="flex-row mb-12">
      <button class="btn btn-secondary btn-sm" data-action="export-xlsx">${t('mydb.exportXlsx')}</button>
      <button class="btn btn-secondary btn-sm" data-action="export-json">${t('mydb.exportJson')}</button>
      <button class="btn btn-secondary btn-sm" data-action="import-json">${t('mydb.importJson')}</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
    <div class="tabs">
      <button class="tab-btn ${mydbTab==='stocks'?'active':''}" data-tab="stocks">${t('mydb.stocks')} (${db.stocks.length})</button>
      <button class="tab-btn ${mydbTab==='trades'?'active':''}" data-tab="trades">${t('mydb.trades')} (${db.trades.length})</button>
      <button class="tab-btn ${mydbTab==='news'?'active':''}" data-tab="news">${t('mydb.news')} (${db.news.length})</button>
    </div>
    <div id="mydb-content">${renderMydbTab()}</div>
  </div>`;

  app.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.addEventListener('click',()=>{mydbTab=b.dataset.tab;mydbPage[mydbTab]=1;app.querySelectorAll('.tab-btn[data-tab]').forEach(x=>x.classList.toggle('active',x.dataset.tab===mydbTab));app.querySelector('#mydb-content').innerHTML=renderMydbTab();bindMydbActions();}));
  app.querySelector('[data-action="export-xlsx"]').addEventListener('click', exportExcel);
  app.querySelector('[data-action="export-json"]').addEventListener('click', exportJSON);
  app.querySelector('[data-action="import-json"]').addEventListener('click', ()=>app.querySelector('#import-file').click());
  app.querySelector('[data-action="add-stock"]').addEventListener('click', openAddStockModal);
  app.querySelector('#import-file').addEventListener('change', e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        const choice=confirm(t('mydb.overwriteConfirm'));
        if(choice){db=data;saveDB();toast(t('common.dataOverwritten'),'success');}
        else{
          data.stocks?.forEach(s=>{if(!db.stocks.find(x=>x.id===s.id))db.stocks.push(s);});
          data.trades?.forEach(t=>{if(!db.trades.find(x=>x.id===t.id))db.trades.push(t);});
          data.news?.forEach(n=>{if(!db.news.find(x=>x.id===n.id))db.news.push(n);});
          data.rules?.forEach(r=>{if(!db.rules.find(x=>x.id===r.id))db.rules.push(r);});
          saveDB();toast(t('common.dataMerged'),'success');
        }
        reRenderView(renderMydb);
      } catch(err){toast(t('common.invalidQty'),'error');}
    }; r.readAsText(f);
  });
  bindMydbActions();
}

function renderMydbTab() {
  if (mydbTab === 'stocks') return renderMydbStocks();
  if (mydbTab === 'trades') return renderMydbTrades();
  return renderMydbNews();
}

function renderMydbStocks() {
  const items = db.stocks;
  const total = items.length;
  const page = mydbPage.stocks;
  const slice = items.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  return `<div class="table-wrap"><div class="table-scroll"><table>
    <thead><tr><th>Name</th><th>Ticker</th><th>Exch</th><th>Account</th><th>Category</th><th>Holdings</th><th>Avg Price</th><th>Cur Price</th><th></th></tr></thead>
    <tbody>${slice.map(s=>`<tr>
      <td>${s.name}</td>
      <td class="mono" style="color:var(--accent)">${s.ticker}</td>
      <td><span class="badge badge-${s.exchange.toLowerCase()}">${s.exchange}</span></td>
      <td>${s.account}</td><td>${s.category}</td>
      <td class="td-num mono">${s.holdings}</td>
      <td class="td-num mono">${s.currency==='KRW'?'₩':'$'}${formatNum(s.avgPrice,2)}</td>
      <td class="td-num mono">${s.currentPrice!=null?formatPrice(s.currentPrice,s.currency):'--'}</td>
      <td><button class="btn btn-ghost btn-sm btn-icon" data-delete-stock="${s.id}">✕</button></td>
    </tr>`).join('')}</tbody>
  </table></div>
  ${renderPagination(total, page, 'stocks')}</div>`;
}

function renderMydbTrades() {
  const items = db.trades.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total = items.length;
  const page = mydbPage.trades;
  const slice = items.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  return `<div class="table-wrap"><div class="table-scroll"><table>
    <thead><tr><th>Date</th><th>Stock</th><th>Type</th><th>Qty</th><th>Price</th><th>Total</th><th>Memo</th><th></th></tr></thead>
    <tbody>${slice.map(tr=>{
      const s=db.stocks.find(x=>x.id===tr.stockId);
      return `<tr>
        <td class="mono text-sm">${formatDate(tr.date)}</td>
        <td>${s?.name||'?'} <span class="mono text-xs" style="color:var(--accent)">${s?.ticker||''}</span></td>
        <td><span class="badge badge-${tr.type}">${tr.type.toUpperCase()}</span></td>
        <td class="td-num mono">${formatNum(tr.quantity,4)}</td>
        <td class="td-num mono">${s?.currency==='KRW'?'₩':'$'}${formatNum(tr.price,2)}</td>
        <td class="td-num mono fw-600">${s?.currency==='KRW'?'₩':'$'}${formatNum(tr.quantity*tr.price,2)}</td>
        <td class="text-muted text-sm">${tr.memo||''}</td>
        <td><button class="btn btn-ghost btn-sm btn-icon" data-delete-trade-db="${tr.id}">✕</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>
  ${renderPagination(total, page, 'trades')}</div>`;
}

function renderMydbNews() {
  const items = db.news.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total = items.length;
  const page = mydbPage.news;
  const slice = items.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  return `<div class="table-wrap"><div class="table-scroll"><table>
    <thead><tr><th>Date</th><th>Source</th><th>Summary</th><th>Related</th><th></th></tr></thead>
    <tbody>${slice.map(n=>`<tr>
      <td class="mono text-sm">${formatDate(n.date)}</td>
      <td>${n.url?`<a href="${n.url}" target="_blank">${n.source}</a>`:n.source}</td>
      <td class="text-sm" style="max-width:300px;white-space:normal">${n.summary.slice(0,80)}${n.summary.length>80?'…':''}</td>
      <td class="text-sm">${n.relatedStockIds.map(id=>db.stocks.find(s=>s.id===id)?.ticker||'').filter(Boolean).join(', ')}</td>
      <td><button class="btn btn-ghost btn-sm btn-icon" data-delete-news-db="${n.id}">✕</button></td>
    </tr>`).join('')}</tbody>
  </table></div>
  ${renderPagination(total, page, 'news')}</div>`;
}

function renderPagination(total, page, tab) {
  const pages = Math.ceil(total/PAGE_SIZE);
  if (pages <= 1) return '';
  return `<div class="pagination">
    <button class="page-btn" data-page="${page-1}" data-ptab="${tab}" ${page<=1?'disabled':''}>← Prev</button>
    <span>Page ${page} / ${pages}</span>
    <button class="page-btn" data-page="${page+1}" data-ptab="${tab}" ${page>=pages?'disabled':''}>Next →</button>
  </div>`;
}

function bindMydbActions() {
  const content = document.getElementById('mydb-content');
  if (!content) return;
  content.querySelectorAll('[data-delete-stock]').forEach(b=>b.addEventListener('click',()=>{if(!confirm(t('mydb.deleteStock')))return;const id=b.dataset.deleteStock;db.stocks=db.stocks.filter(x=>x.id!==id);db.trades=db.trades.filter(x=>x.stockId!==id);saveDB();document.getElementById('mydb-content').innerHTML=renderMydbTab();bindMydbActions();}));
  content.querySelectorAll('[data-delete-trade-db]').forEach(b=>b.addEventListener('click',()=>{if(!confirm(t('mydb.deleteTrade')))return;const t=db.trades.find(x=>x.id===b.dataset.deleteTradeDb);db.trades=db.trades.filter(x=>x.id!==b.dataset.deleteTradeDb);if(t)recalcStock(t.stockId);saveDB();document.getElementById('mydb-content').innerHTML=renderMydbTab();bindMydbActions();}));
  content.querySelectorAll('[data-delete-news-db]').forEach(b=>b.addEventListener('click',()=>{if(!confirm(t('playbook.deleteConfirm')))return;db.news=db.news.filter(x=>x.id!==b.dataset.deleteNewsDb);saveDB();document.getElementById('mydb-content').innerHTML=renderMydbTab();bindMydbActions();}));
  content.querySelectorAll('[data-page]').forEach(b=>b.addEventListener('click',()=>{mydbPage[b.dataset.ptab]=parseInt(b.dataset.page);document.getElementById('mydb-content').innerHTML=renderMydbTab();bindMydbActions();}));
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  const total = totalPortfolioValue();
  const stockRows = db.stocks.map(s=>{const c=calcStock(s);const alloc=c.currentValue!=null?toKRW(c.currentValue,s.currency)/total*100:null;return{Name:s.name,Ticker:s.ticker,Exchange:s.exchange,Currency:s.currency,Holdings:s.holdings,'Avg Price':s.avgPrice,'Current Price':s.currentPrice||'','Current Value (KRW)':c.currentValue!=null?Math.round(toKRW(c.currentValue,s.currency)):'',"P&L Amount":c.profitAmount!=null?parseFloat(c.profitAmount.toFixed(2)):'',"P&L %":c.profitRate!=null?c.profitRate.toFixed(2)+'%':'','Alloc %':alloc!=null?alloc.toFixed(1)+'%':'',Category:s.category,Account:s.account};});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stockRows), 'Stocks');
  const tradeRows=db.trades.map(tr=>{const s=db.stocks.find(x=>x.id===tr.stockId);return{Date:tr.date,'Stock Name':s?.name||'',Ticker:s?.ticker||'',Type:tr.type,Quantity:tr.quantity,Price:tr.price,Total:tr.quantity*tr.price,Memo:tr.memo||''};});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tradeRows.length?tradeRows:[{note:'No trades'}]), 'Trades');
  const newsRows=db.news.map(n=>({Date:n.date,Source:n.source,URL:n.url,Summary:n.summary,'Related Stocks':n.relatedStockIds.map(id=>db.stocks.find(s=>s.id===id)?.name||'').filter(Boolean).join(', ')}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(newsRows.length?newsRows:[{note:'No news'}]), 'News');
  const ruleRows=db.rules.map(r=>({Name:r.name,Active:r.active,Metric:r.condition.metric,Operator:r.condition.operator,Value:r.condition.value,'Target Stock':r.condition.stockId?db.stocks.find(s=>s.id===r.condition.stockId)?.name||'?':'All',Message:r.message}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ruleRows.length?ruleRows:[{note:'No rules'}]), 'Rules');
  XLSX.writeFile(wb, 'stockd_backup.xlsx');
  toast(t('common.excelExported'), 'success');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'stockd_backup.json'; a.click();
  toast(t('common.jsonExported'), 'success');
}

let detailTab = 'overview';
let detailChartInstance = null;

function openStockDetail(stockId) {
  const stock = db.stocks.find(s=>s.id===stockId);
  if (!stock) return;
  detailTab = 'overview';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal modal-lg" id="detail-modal">
      <div class="modal-header">
        <div>
          <span class="modal-title">${stock.name}</span>
          <span class="mono text-sm" style="color:var(--accent);margin-left:8px">${stock.ticker}</span>
          <span class="badge badge-${stock.exchange.toLowerCase()}" style="margin-left:8px">${stock.exchange}</span>
        </div>
        <button class="modal-close btn">✕</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab ${detailTab==='overview'?'active':''}" data-dtab="overview">Overview</button>
        <button class="modal-tab ${detailTab==='trades'?'active':''}"   data-dtab="trades">Trade History</button>
        <button class="modal-tab ${detailTab==='news'?'active':''}"     data-dtab="news">News</button>
        <button class="modal-tab ${detailTab==='chart'?'active':''}"    data-dtab="chart">30-Day Chart</button>
      </div>
      <div id="detail-content">${renderDetailTab(stock)}</div>
    </div>`;

  document.body.appendChild(overlay);

  overlay.querySelector('.modal-close').onclick = () => { if(detailChartInstance){detailChartInstance.destroy();detailChartInstance=null;} overlay.remove(); };
  overlay.addEventListener('click', e => { if(e.target===overlay){if(detailChartInstance){detailChartInstance.destroy();detailChartInstance=null;}overlay.remove();} });

  overlay.querySelectorAll('[data-dtab]').forEach(b=>b.addEventListener('click',()=>{
    if(detailChartInstance){detailChartInstance.destroy();detailChartInstance=null;}
    detailTab=b.dataset.dtab;
    overlay.querySelectorAll('[data-dtab]').forEach(x=>x.classList.toggle('active',x.dataset.dtab===detailTab));
    overlay.querySelector('#detail-content').innerHTML=renderDetailTab(stock);
    if(detailTab==='trades')bindDetailTradeActions(overlay,stock);
    if(detailTab==='news')bindDetailNewsActions(overlay,stock);
    if(detailTab==='chart')loadDetailChart(stock);
  }));

  bindDetailTradeActions(overlay, stock);
}

function renderDetailTab(stock) {
  if (detailTab==='overview') return renderDetailOverview(stock);
  if (detailTab==='trades')   return renderDetailTrades(stock);
  if (detailTab==='news')     return renderDetailNews(stock);
  return `<div style="text-align:center;padding:20px"><div class="shimmer" style="height:200px;border-radius:8px;display:block">Loading chart...</div></div>`;
}

function renderDetailOverview(stock) {
  const c = calcStock(stock);
  const total = totalPortfolioValue();
  const alloc = (c.currentValue!=null&&total>0) ? toKRW(c.currentValue,stock.currency)/total*100 : null;
  const fields = [
    ['Account', stock.account], ['Category', stock.category],
    ['Holdings', formatNum(stock.holdings, stock.holdings%1===0?0:4) + ' shares'],
    ['Avg Price', stock.currency==='KRW'?'₩'+formatNum(stock.avgPrice,0):'$'+formatNum(stock.avgPrice,2)],
    ['Current Price', stock.currentPrice!=null?formatPrice(stock.currentPrice,stock.currency):'--'],
    ['Current Value', c.currentValue!=null?formatKRW(toKRW(c.currentValue,stock.currency)):'--'],
    ['P&L Amount', c.profitAmount!=null?`<span class="${plClass(c.profitAmount)}">${c.profitAmount>=0?'+':''}${stock.currency==='KRW'?'₩'+formatNum(c.profitAmount,0):'$'+formatNum(c.profitAmount,2)}</span>`:'--'],
    ['P&L %', c.profitRate!=null?`<span class="${plClass(c.profitRate)}">${formatPct(c.profitRate)}</span>`:'--'],
    ['Allocation', alloc!=null?formatNum(alloc,1)+'%':'--'],
    ['Exchange', stock.exchange], ['Currency', stock.currency],
  ];
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    ${fields.map(([k,v])=>`<div class="card" style="padding:12px"><div class="card-title">${k}</div><div class="mono">${v}</div></div>`).join('')}
  </div>
  <div class="card" style="padding:12px"><div class="card-title">Memo</div><p class="text-sm">${stock.memo||'—'}</p></div>
  <div class="modal-footer" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
    <button class="btn btn-primary btn-sm" id="detail-trade-btn">Record Trade</button>
  </div>`;
}

function renderDetailTrades(stock) {
  const trades = db.trades.filter(t=>t.stockId===stock.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!trades.length) return `<div class="empty-state">No trades for ${stock.name} yet.</div>`;
  return `<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Type</th><th>Qty</th><th>Price</th><th>Total</th><th>Memo</th><th></th></tr></thead>
    <tbody>${trades.map(tr=>`<tr>
      <td class="mono text-sm">${formatDate(tr.date)}</td>
      <td><span class="badge badge-${tr.type}">${tr.type.toUpperCase()}</span></td>
      <td class="td-num mono">${formatNum(tr.quantity,4)}</td>
      <td class="td-num mono">${stock.currency==='KRW'?'₩':'$'}${formatNum(tr.price,2)}</td>
      <td class="td-num mono fw-600">${stock.currency==='KRW'?'₩':'$'}${formatNum(tr.quantity*tr.price,2)}</td>
      <td class="text-muted text-sm">${tr.memo||''}</td>
      <td><button class="btn btn-ghost btn-sm btn-icon" data-del-detail-trade="${tr.id}">✕</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderDetailNews(stock) {
  const items = db.news.filter(n=>n.relatedStockIds.includes(stock.id)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!items.length) return `<div class="empty-state">No news linked to ${stock.name}.</div>`;
  return items.map(n=>`<div class="card mb-12">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:6px">
      <span class="mono text-sm text-muted">${formatDate(n.date)}</span>
      ${n.url?`<a href="${n.url}" target="_blank" class="fw-600 text-sm">${n.source}</a>`:`<span class="fw-600 text-sm">${n.source}</span>`}
    </div>
    <p class="text-sm" style="line-height:1.5">${n.summary}</p>
  </div>`).join('');
}

function bindDetailTradeActions(overlay, stock) {
  overlay.querySelector('#detail-trade-btn')?.addEventListener('click', () => { overlay.remove(); openTradeModal(stock.id); });
  overlay.querySelectorAll('[data-del-detail-trade]').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm(t('playbook.deleteConfirm')))return;
    const tr=db.trades.find(x=>x.id===b.dataset.delDetailTrade);
    db.trades=db.trades.filter(x=>x.id!==b.dataset.delDetailTrade);
    if(tr)recalcStock(tr.stockId);
    saveDB();
    overlay.querySelector('#detail-content').innerHTML=renderDetailTrades(stock);
    bindDetailTradeActions(overlay,stock);
  }));
}
function bindDetailNewsActions(overlay, stock) {/* news in modal is read-only view */}

async function loadDetailChart(stock) {
  const wrap = document.querySelector('#detail-content');
  if (!wrap) return;
  wrap.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">Loading chart data...</div>`;
  try {
    const data = await fetch30DayChart(stock);
    wrap.innerHTML = `<div style="height:280px;position:relative"><canvas id="detail-chart-canvas"></canvas></div>`;
    const isDark = db.settings.theme === 'dark';
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#94A3B8' : '#64748B';
    const labels = data.timestamps.map(ts => new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    const ctx = document.getElementById('detail-chart-canvas');
    detailChartInstance = new Chart(ctx, {
      type:'line',
      data:{ labels, datasets:[{ data:data.closes, borderColor:'#3B82F6', backgroundColor:'rgba(59,130,246,0.08)', fill:true, tension:0.3, pointRadius:2, borderWidth:2 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:gridColor},ticks:{color:textColor,maxTicksLimit:8,font:{size:10}}}, y:{grid:{color:gridColor},ticks:{color:textColor}} } }
    });
  } catch(e) {
    if(wrap) wrap.innerHTML = `<div class="card" style="text-align:center;padding:40px;color:var(--muted)">Chart data unavailable for ${stock.ticker}.</div>`;
  }
}

/* ═══════════════════════════════════════════════════════════
   SECTION 17 — ONBOARDING
═══════════════════════════════════════════════════════════ */
const ONBOARD_CONTENT = {
  en: {
    tagline: 'Your personal stock portfolio tracker',
    stepLang: 'Step 1 of 3 — Choose your language',
    stepFeatures: 'Step 2 of 3 — What you can do',
    stepData: 'Step 3 of 3 — How to start',
    features: [
      { icon:'◈', title:'Dashboard', desc:'Track all your holdings, real-time prices, and P&L at a glance' },
      { icon:'◉', title:'Graphs', desc:'Visualize allocation by stock, category, and profit rates' },
      { icon:'⊕', title:'Trade Log', desc:'Record every buy & sell, auto-calculates your average price' },
      { icon:'⚡', title:'My Rule', desc:'Set alerts — get notified when profit or allocation thresholds are hit' },
    ],
    dataTitle: 'Start with sample data or fresh?',
    dataSample: { icon:'📊', title:'Sample data', desc:'NVIDIA · Samsung · Apple' },
    dataFresh:  { icon:'✦', title:'Start fresh', desc:'Add your own stocks' },
    dataHint: 'You can always add stocks in My DB → + Add Stock',
    next: 'Next →',
    getStarted: 'Get Started',
  },
  ko: {
    tagline: '나만의 주식 포트폴리오 관리앱',
    stepLang: '1단계 / 3 — 언어 선택',
    stepFeatures: '2단계 / 3 — 주요 기능',
    stepData: '3단계 / 3 — 시작 방법',
    features: [
      { icon:'◈', title:'대시보드', desc:'보유 종목, 실시간 가격, 수익률을 한눈에' },
      { icon:'◉', title:'그래프', desc:'종목·카테고리별 비중과 수익률을 시각화' },
      { icon:'⊕', title:'매매일지', desc:'매수·매도 기록하면 평단가 자동 계산' },
      { icon:'⚡', title:'내 규칙', desc:'수익률·비중 기준 설정 → 조건 충족 시 알림' },
    ],
    dataTitle: '샘플 데이터로 시작할까요?',
    dataSample: { icon:'📊', title:'샘플 데이터', desc:'엔비디아 · 삼성전자 · 애플' },
    dataFresh:  { icon:'✦', title:'빈 화면으로', desc:'직접 종목을 추가합니다' },
    dataHint: '내DB → + 종목추가 에서 언제든지 종목을 추가할 수 있어요',
    next: '다음 →',
    getStarted: '시작하기',
  }
};

let _obLang = 'en';
let _obData = 'sample';

function showOnboarding() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  renderOnboardStep(1);
}

function renderOnboardStep(step) {
  const c = ONBOARD_CONTENT[_obLang];
  const app = document.getElementById('app');

  const dots = [1,2,3].map(i =>
    `<div class="onboard-dot ${i===step?'active':''}"></div>`
  ).join('');

  let body = '';

  if (step === 1) {
    body = `
      <div class="onboard-step-label">${ONBOARD_CONTENT[_obLang].stepLang}</div>
      <div class="onboard-lang-grid">
        <button class="onboard-lang-btn ${_obLang==='en'?'active':''}" data-lang="en">
          <div class="onboard-lang-flag">🇺🇸</div>
          <div class="onboard-lang-name">English</div>
          <div class="onboard-lang-sub">International</div>
        </button>
        <button class="onboard-lang-btn ${_obLang==='ko'?'active':''}" data-lang="ko">
          <div class="onboard-lang-flag">🇰🇷</div>
          <div class="onboard-lang-name">한국어</div>
          <div class="onboard-lang-sub">Korean</div>
        </button>
      </div>
      <button class="onboard-btn-primary" data-next="2">${ONBOARD_CONTENT[_obLang].next}</button>`;
  }

  if (step === 2) {
    body = `
      <div class="onboard-step-label">${c.stepFeatures}</div>
      <div class="onboard-features">
        ${c.features.map(f => `
          <div class="onboard-feature">
            <div class="onboard-feature-icon">${f.icon}</div>
            <div class="onboard-feature-text">
              <div class="onboard-feature-title">${f.title}</div>
              <div class="onboard-feature-desc">${f.desc}</div>
            </div>
          </div>`).join('')}
      </div>
      <button class="onboard-btn-primary" data-next="3">${c.next}</button>`;
  }

  if (step === 3) {
    body = `
      <div class="onboard-step-label">${c.stepData}</div>
      <p style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:4px">${c.dataTitle}</p>
      <p style="font-size:11px;color:var(--accent);text-align:center;margin-bottom:16px;font-weight:500">${c.dataHint}</p>
      <div class="onboard-data-grid">
        <button class="onboard-data-btn ${_obData==='sample'?'active':''}" data-data="sample">
          <div class="onboard-data-icon">${c.dataSample.icon}</div>
          <div class="onboard-data-title">${c.dataSample.title}</div>
          <div class="onboard-data-desc">${c.dataSample.desc}</div>
        </button>
        <button class="onboard-data-btn ${_obData==='fresh'?'active':''}" data-data="fresh">
          <div class="onboard-data-icon">${c.dataFresh.icon}</div>
          <div class="onboard-data-title">${c.dataFresh.title}</div>
          <div class="onboard-data-desc">${c.dataFresh.desc}</div>
        </button>
      </div>
      <button class="onboard-btn-primary" data-finish="1">${c.getStarted}</button>`;
  }

  app.innerHTML = `
    <div class="onboard-wrap">
      <div class="onboard-card">
        <div class="onboard-logo">◈ STOCKD</div>
        <div class="onboard-tagline">${ONBOARD_CONTENT[_obLang].tagline}</div>
        <div class="onboard-dots">${dots}</div>
        ${body}
      </div>
    </div>`;

  // Language select
  app.querySelectorAll('[data-lang]').forEach(b => b.addEventListener('click', () => {
    _obLang = b.dataset.lang;
    db.settings.language = _obLang;
    db.settings.deletedAccounts = [];
    db.settings.deletedCategories = [];
    renderOnboardStep(1);
  }));

  // Data select
  app.querySelectorAll('[data-data]').forEach(b => b.addEventListener('click', () => {
    _obData = b.dataset.data;
    app.querySelectorAll('[data-data]').forEach(x => x.classList.toggle('active', x.dataset.data === _obData));
  }));

  // Next
  app.querySelectorAll('[data-next]').forEach(b => b.addEventListener('click', () => {
    renderOnboardStep(parseInt(b.dataset.next));
  }));

  // Finish
  app.querySelector('[data-finish]')?.addEventListener('click', () => {
    db.settings.onboarded = true;
    if (_obData === 'fresh') {
      db.stocks = [];
      db.trades = [];
      db.rules  = [];
      db.playbook = { principles:[], goals:[], watchlist:[] };
    }
    seedIfEmpty();
    saveDB();
    navigate('home');
  });
}


/* ═══════════════════════════════════════════════════════════
   SECTION 18 — INIT
═══════════════════════════════════════════════════════════ */
loadDB();
if (!db.settings.deletedAccounts)  db.settings.deletedAccounts  = [];
if (!db.settings.deletedCategories) db.settings.deletedCategories = [];
document.body.setAttribute('data-theme', db.settings.theme || 'light');

if (!db.settings.onboarded && db.stocks.length === 0) {
  // First time — show onboarding
  _obLang = db.settings.language || 'en';
  showOnboarding();
} else {
  if (!db.settings.onboarded) db.settings.onboarded = true; // existing user, mark done
  seedIfEmpty();
  const _startView = _sid ? (loadView() || 'home') : 'home';
  navigate(_startView);
  const needsRefresh = db.stocks.some(s => !s.priceUpdatedAt || (Date.now()-new Date(s.priceUpdatedAt))>15*60*1000);
  if (needsRefresh) refreshAllPrices();
}
</script>
